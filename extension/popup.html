<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        color: #222;
      }
      .wrap { padding: 14px; }
      h1 { font-size: 15px; margin: 0 0 10px; }
      .meta { font-size: 12px; color: #666; word-break: break-all; margin-bottom: 10px; }
      .title { font-weight: 600; color: #222; }
      button {
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 6px;
        background: #0d6efd;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { background: #9ec5fe; cursor: default; }
      .status { margin-top: 10px; font-size: 13px; min-height: 18px; }
      .ok { color: #198754; }
      .err { color: #dc3545; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>🔖 Save to Productivity Hub</h1>
      <div class="meta">
        <div class="title" id="title">…</div>
        <div id="url">…</div>
      </div>
      <button id="save">Save to read-later</button>
      <div class="status" id="status"></div>
    </div>
    <script src="config.js"></script>
    <script src="resolve.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
