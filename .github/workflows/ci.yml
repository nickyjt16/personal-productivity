name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: ProductivityHub.Desktop is a Windows-only WPF app and is intentionally
# not built here (this runner is Linux). CI covers Core + API + tests + the web
# frontend, which are cross-platform.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/ProductivityHub.Web/package-lock.json

      - name: Build frontend
        working-directory: src/ProductivityHub.Web
        run: |
          npm ci
          npm run build

      - name: Build + test (Core, API, tests)
        run: dotnet test tests/ProductivityHub.Api.Tests/ProductivityHub.Api.Tests.csproj -c Release
